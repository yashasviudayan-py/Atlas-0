[project]
name = "atlas-0"
version = "0.1.0"
description = "Spatial Reasoning & Physical World-Model Engine"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "fastapi==0.115.6",
    "uvicorn[standard]==0.34.0",
    "pydantic==2.10.4",
    "structlog==24.4.0",
    "httpx==0.28.1",
    "numpy==2.2.1",
    "Pillow==11.1.0",
    "protobuf==5.29.3",
    "scikit-learn==1.6.0",
    "prometheus-client==0.21.0",
]

[project.optional-dependencies]
dev = [
    "pytest==8.3.4",
    "pytest-asyncio==0.24.0",
    "pytest-benchmark==5.1.0",
    "ruff==0.8.6",
    "mypy==1.14.1",
]
ml = [
    "torch>=2.5.0",
    "torchvision>=0.20.0",
    "transformers>=4.47.0",
    "ollama>=0.4.0",
]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "SIM", "RUF"]

[tool.pytest.ini_options]
testpaths = ["python/tests"]
asyncio_mode = "auto"

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true

[build-system]
requires = ["setuptools>=75.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["python"]
