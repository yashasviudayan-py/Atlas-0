<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ATLAS-0 room safety scan hero</title>
  <desc id="desc">A modern dark hero panel for ATLAS-0 with a room safety scan icon, product wordmark, and supporting copy.</desc>
  <defs>
    <linearGradient id="heroBg" x1="96" y1="40" x2="1104" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#171616"/>
      <stop offset="0.55" stop-color="#1B1817"/>
      <stop offset="1" stop-color="#121817"/>
    </linearGradient>
    <linearGradient id="heroStroke" x1="132" y1="64" x2="1026" y2="352" gradientUnits="userSpaceOnUse">
      <stop stop-color="#214742"/>
      <stop offset="0.5" stop-color="#2D3E3B"/>
      <stop offset="1" stop-color="#734A23"/>
    </linearGradient>
    <linearGradient id="accent" x1="188" y1="120" x2="360" y2="292" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0C8074"/>
      <stop offset="1" stop-color="#D67F30"/>
    </linearGradient>
    <linearGradient id="card" x1="180" y1="112" x2="344" y2="284" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF9F0"/>
      <stop offset="1" stop-color="#F1E7D8"/>
    </linearGradient>
    <filter id="softGlow" x="130" y="60" width="940" height="272" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="titleGlow" x="372" y="96" width="456" height="102" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="1200" height="400" rx="36" fill="#0D1117"/>
  <g filter="url(#softGlow)" opacity="0.32">
    <ellipse cx="270" cy="104" rx="210" ry="88" fill="#0C8074"/>
    <ellipse cx="964" cy="298" rx="248" ry="104" fill="#D67F30"/>
  </g>

  <rect x="92" y="48" width="1016" height="292" rx="42" fill="url(#heroBg)"/>
  <rect x="92.75" y="48.75" width="1014.5" height="290.5" rx="41.25" stroke="url(#heroStroke)" stroke-width="1.5"/>

  <g opacity="0.18">
    <path d="M686 96H1046" stroke="#F7F4EE" stroke-width="1"/>
    <path d="M712 136H1084" stroke="#F7F4EE" stroke-width="1"/>
    <path d="M748 176H1100" stroke="#F7F4EE" stroke-width="1"/>
    <path d="M730 216H1070" stroke="#F7F4EE" stroke-width="1"/>
    <path d="M680 256H1026" stroke="#F7F4EE" stroke-width="1"/>
    <path d="M640 296H972" stroke="#F7F4EE" stroke-width="1"/>
  </g>

  <rect x="154" y="102" width="180" height="180" rx="38" fill="url(#card)"/>
  <rect x="154" y="102" width="180" height="180" rx="38" stroke="url(#accent)" stroke-width="10"/>
  <path d="M204 194L245 156L286 194" stroke="#201916" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M221 191V226H272V191" stroke="#201916" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M260 186C270 174 286 169 301 170" stroke="#0C8074" stroke-width="10" stroke-linecap="round"/>
  <path d="M266 216C276 209 289 205 302 206" stroke="#D67F30" stroke-width="10" stroke-linecap="round"/>
  <circle cx="246.5" cy="226" r="9" fill="#0C8074"/>

  <rect x="390" y="108" width="170" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.06"/>
  <rect x="390.75" y="108.75" width="168.5" height="32.5" rx="16.25" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1.5"/>
  <text x="418" y="131" fill="#C8B8AB" font-family="'IBM Plex Mono', 'SFMono-Regular', monospace" font-size="16" font-weight="500" letter-spacing="2">UPLOAD-FIRST SAFETY REPORTS</text>

  <g filter="url(#titleGlow)" opacity="0.26">
    <text x="400" y="186" fill="#FFFFFF" font-family="'Sora', 'Inter', 'Segoe UI Variable Display', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="96" font-weight="800" letter-spacing="-4">ATLAS-0</text>
  </g>
  <text x="400" y="186" fill="#FFFFFF" font-family="'Sora', 'Inter', 'Segoe UI Variable Display', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="96" font-weight="800" letter-spacing="-4">ATLAS-0</text>
  <text x="402" y="236" fill="#B39D8E" font-family="'IBM Plex Mono', 'SFMono-Regular', monospace" font-size="24" font-weight="500" letter-spacing="5">ROOM SAFETY SCAN</text>
  <text x="400" y="286" fill="#E5D8CF" font-family="'Inter', 'Segoe UI', 'Avenir Next', sans-serif" font-size="31" font-weight="500">Upload a walkthrough. Get a trustworthy hazard report.</text>
  <text x="400" y="320" fill="#8E8278" font-family="'Inter', 'Segoe UI', 'Avenir Next', sans-serif" font-size="21">Report-first. Evidence-backed. Honest about uncertainty.</text>
</svg>
