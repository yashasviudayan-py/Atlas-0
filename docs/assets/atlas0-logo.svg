<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ATLAS-0 room safety scan</title>
  <desc id="desc">A polished product hero for ATLAS-0, showing a home safety scan workflow from upload to evidence-backed report.</desc>
  <defs>
    <linearGradient id="canvas" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#091014"/>
      <stop offset="0.48" stop-color="#11120F"/>
      <stop offset="1" stop-color="#14100B"/>
    </linearGradient>
    <linearGradient id="rim" x1="54" y1="54" x2="1146" y2="466" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0FA997"/>
      <stop offset="0.58" stop-color="#836F4B"/>
      <stop offset="1" stop-color="#F08A24"/>
    </linearGradient>
    <linearGradient id="mark" x1="122" y1="154" x2="286" y2="318" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FCF6EA"/>
      <stop offset="0.54" stop-color="#FFFDF6"/>
      <stop offset="1" stop-color="#F5B351"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#15B8A6"/>
      <stop offset="1" stop-color="#08776D"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect width="1200" height="520" rx="42" fill="url(#canvas)"/>
  <rect x="28" y="28" width="1144" height="464" rx="34" stroke="url(#rim)" stroke-opacity="0.78" stroke-width="2"/>
  <path d="M0 0H1200V144C1038 120 898 119 740 144C562 172 384 174 208 140C123 124 55 101 0 74V0Z" fill="#0D1A1B" opacity="0.72"/>
  <path d="M930 94C1019 79 1097 91 1164 129V492H752C808 420 836 338 836 247C836 168 868 105 930 94Z" fill="#21160D" opacity="0.78"/>

  <g opacity="0.26">
    <path d="M78 377H530" stroke="#FFFFFF" stroke-opacity="0.16"/>
    <path d="M82 419H474" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <path d="M768 114H1094" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <path d="M792 158H1124" stroke="#FFFFFF" stroke-opacity="0.1"/>
    <circle cx="1046" cy="346" r="92" stroke="#FFFFFF" stroke-opacity="0.1"/>
    <circle cx="1046" cy="346" r="47" stroke="#FFFFFF" stroke-opacity="0.12"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="94" y="132" width="226" height="226" rx="46" fill="url(#mark)"/>
    <rect x="94" y="132" width="226" height="226" rx="46" stroke="#0EA091" stroke-width="8"/>
    <rect x="104" y="142" width="206" height="206" rx="38" stroke="#F5A33C" stroke-opacity="0.48" stroke-width="2"/>
    <path d="M151 252L207 198L264 252" stroke="#181313" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M173 245V298C173 307 180 314 189 314H247C256 314 263 307 263 298V246" stroke="#181313" stroke-width="15" stroke-linecap="round"/>
    <path d="M231 260C249 248 271 244 291 248" stroke="#0A9E90" stroke-width="15" stroke-linecap="round"/>
    <path d="M241 288C258 277 277 274 294 278" stroke="#E88425" stroke-width="15" stroke-linecap="round"/>
    <circle cx="220" cy="304" r="12" fill="#0A9E90"/>
  </g>

  <g font-family="Space Grotesk, Segoe UI, Arial, sans-serif">
    <rect x="374" y="128" width="186" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.16"/>
    <text x="397" y="151" fill="#E8DDD0" font-size="15" font-weight="800">ROOM SAFETY SCAN</text>
    <text x="374" y="244" fill="#FFFFFF" font-size="104" font-weight="900">ATLAS-0</text>
    <text x="380" y="294" fill="#E9E2D8" font-size="29" font-weight="700">Upload a walkthrough. Get a hazard report.</text>
    <text x="381" y="330" fill="#AFA49A" font-size="20">Evidence frames, confidence signals, fix-first recommendations, and PDF export.</text>
  </g>

  <g font-family="Space Grotesk, Segoe UI, Arial, sans-serif">
    <rect x="94" y="392" width="294" height="62" rx="24" fill="#FFFFFF" fill-opacity="0.075" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <circle cx="130" cy="423" r="15" fill="url(#teal)"/>
    <path d="M122 423L128 429L139 416" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="158" y="417" fill="#FFFFFF" font-size="18" font-weight="800">Report-first MVP</text>
    <text x="158" y="441" fill="#AFA49A" font-size="15">Built for beta feedback, not demo theater.</text>

    <rect x="418" y="392" width="300" height="62" rx="24" fill="#FFFFFF" fill-opacity="0.075" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <circle cx="454" cy="423" r="15" fill="#F08A24"/>
    <path d="M446 423H462M454 415V431" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <text x="482" y="417" fill="#FFFFFF" font-size="18" font-weight="800">Evidence-backed</text>
    <text x="482" y="441" fill="#AFA49A" font-size="15">Every finding should show why it exists.</text>

    <rect x="748" y="392" width="358" height="62" rx="24" fill="#FFFFFF" fill-opacity="0.075" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <circle cx="784" cy="423" r="15" fill="#C56F43"/>
    <path d="M777 426L784 417L791 426" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="812" y="417" fill="#FFFFFF" font-size="18" font-weight="800">Honest about uncertainty</text>
    <text x="812" y="441" fill="#AFA49A" font-size="15">Decision support, not safety certification.</text>
  </g>
</svg>
