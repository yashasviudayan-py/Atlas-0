# Atlas-0 Default Configuration
# Override with ATLAS_ prefixed environment variables

[stream]
target_fps = 60
frame_width = 1280
frame_height = 720
buffer_size = 4
device = "0"

[camera]
slam_width = 640
slam_height = 480

[camera.intrinsics]
fx = 458.654
fy = 457.296
cx = 367.215
cy = 248.375

[camera.distortion]
k1 = -0.283408
k2 = 0.073959
p1 = 0.000194
p2 = 0.000018

[slam]
min_features = 100
max_gaussians = 500000
keyframe_translation_threshold = 0.1
keyframe_rotation_threshold = 0.1
optimization_iterations = 10
enable_loop_closure = true

[physics]
timestep = 0.001
gravity = 9.81
max_steps = 1000
rest_threshold = 0.01

[vlm]
model_name = "moondream"
ollama_host = "http://localhost:11434"
max_tokens = 256
temperature = 0.1
timeout_seconds = 10.0

[world_model]
assessment_interval_seconds = 1.0
max_concurrent_queries = 3
risk_threshold = 0.3

[api]
host = "0.0.0.0"
port = 8420
cors_origins = ["http://localhost:3000"]
