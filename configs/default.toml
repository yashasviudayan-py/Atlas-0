# Atlas-0 Default Configuration
# Override with ATLAS_ prefixed environment variables

[stream]
target_fps = 60
frame_width = 1280
frame_height = 720
buffer_size = 4
device = "0"

[camera]
slam_width = 640
slam_height = 480

[camera.intrinsics]
fx = 458.654
fy = 457.296
cx = 367.215
cy = 248.375

[camera.distortion]
k1 = -0.283408
k2 = 0.073959
p1 = 0.000194
p2 = 0.000018

[slam]
min_features = 100
max_gaussians = 500000
keyframe_translation_threshold = 0.1
keyframe_rotation_threshold = 0.1
optimization_iterations = 10
enable_loop_closure = true

[gaussian]
# Initial opacity for newly triangulated Gaussians.
initial_opacity = 0.5
# Gaussian scale floor / ceiling (metres).
min_scale = 0.001
max_scale = 1.0

[gaussian.optimizer]
# Adam learning rates for differentiable 3DGS optimization.
lr_opacity = 0.05
lr_color = 0.01
# Adam learning rate for Gaussian centre position (metres / step).
lr_position = 0.0001
# Adam learning rate for covariance upper-triangle entries.
lr_covariance = 0.0005
# Gaussians below this opacity are pruned after each keyframe.
min_opacity = 0.005

[physics]
timestep = 0.001
gravity = 9.81
max_steps = 1000
rest_threshold = 0.01

[vlm]
# VLM backend: "ollama" (default, local, free) | "claude" | "openai"
# Switch at runtime: ATLAS_VLM_PROVIDER=claude
provider = "ollama"

# Ollama settings (used when provider = "ollama")
model_name = "moondream"
ollama_host = "http://localhost:11434"

# Claude settings (used when provider = "claude")
# API key from: ANTHROPIC_API_KEY env var
# Install:      pip install "atlas-0[claude]"
claude_model = "claude-sonnet-4-6"

# OpenAI settings (used when provider = "openai")
# API key from: OPENAI_API_KEY env var
# Install:      pip install "atlas-0[openai]"
openai_model = "gpt-4o"

max_tokens = 256
temperature = 0.1
timeout_seconds = 30.0

[world_model]
assessment_interval_seconds = 1.0
max_concurrent_queries = 3
risk_threshold = 0.3

[api]
host = "0.0.0.0"
port = 8420
cors_origins = ["http://localhost:3000"]
# Optional private-beta access token for upload/report endpoints.
# Prefer setting via environment:
#   ATLAS_API_ACCESS_TOKEN=...
access_token = ""
# Allow local browser/dev use without a token when requests come from loopback.
allow_unauthenticated_loopback = true
# Listing all jobs is disabled by default to avoid exposing room reports broadly.
enable_job_listing = false

[ipc]
# Path to the memory-mapped Gaussian snapshot file.
mmap_path = "/tmp/atlas.mmap"
# Per-buffer capacity (Gaussians). Both writer and reader must agree.
max_gaussians = 100000
# Write a snapshot every N keyframes (reduces IPC overhead).
snapshot_interval_keyframes = 5

[uploads]
# Disk-backed directory for persisted upload job manifests and reports.
storage_dir = ".atlas/uploads"
# Keep the original uploaded media alongside generated report artifacts.
# Disable by default to reduce privacy exposure.
save_original_uploads = false
# Best-effort cap used when pruning very old persisted jobs.
max_persisted_jobs = 200
# Age-based retention window for persisted uploads/artifacts.
retention_days = 14
# Hard cap for one upload request body.
max_upload_bytes = 75000000
# Reject walkthroughs longer than this duration before processing.
max_video_duration_seconds = 75.0
# Number of worker tasks processing uploads at once.
max_concurrent_jobs = 2
# Maximum queued + processing jobs kept before the API starts rejecting new uploads.
max_queue_depth = 24
# Retry budget for failed uploads before they become terminal errors.
max_job_attempts = 2
# Per-job wall clock timeout for upload analysis workers.
job_timeout_seconds = 180.0
