name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_TOOLCHAIN: "1.95.0"

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all

  python:
    name: Python
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check python/ scripts/check_deployment.py scripts/run_upload_worker.py

      - name: Ruff format check
        run: ruff format --check python/

      - name: Frontend syntax check
        run: |
          node --check frontend/js/api.js
          node --check frontend/js/app.js
          node --check frontend/js/upload.js

      - name: Worker entrypoint syntax check
        run: |
          python -m py_compile scripts/check_deployment.py
          python -m py_compile scripts/run_upload_worker.py

      - name: Tests
        run: pytest python/tests/ -v

      - name: Deployment preflight
        run: python scripts/check_deployment.py

      - name: Benchmark smoke test
        run: python scripts/benchmark.py --iterations 1 --skip-vlm
