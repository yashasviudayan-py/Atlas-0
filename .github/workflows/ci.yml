name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_TOOLCHAIN: "1.95.0"

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all

  python:
    name: Python
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check python/ scripts/

      - name: Ruff format check
        run: ruff format --check python/ scripts/

      - name: Frontend syntax check
        run: |
          for file in frontend/js/*.js frontend/tests/*.mjs; do
            node --check "$file"
          done

      - name: Worker entrypoint syntax check
        run: |
          for file in scripts/*.py; do
            python -m py_compile "$file"
          done

      - name: Tests
        run: pytest python/tests/ -v

      - name: Deployment preflight
        run: python scripts/check_deployment.py

      - name: Benchmark smoke test
        run: python scripts/benchmark.py --iterations 1 --skip-vlm

      - name: API load smoke test
        run: python scripts/load_smoke.py --requests 24 --concurrency 6

  frontend:
    name: Frontend Browser
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Browser smoke
        run: npm run test:frontend:required
