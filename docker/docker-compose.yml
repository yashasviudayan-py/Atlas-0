services:
  atlas:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8420:8420"   # REST API + WebSocket
      - "8421:8421"   # Reserved for future Prometheus remote-write endpoint
    environment:
      - ATLAS_VLM__OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ../configs:/app/configs:ro
      # Shared memory file written by the Rust SLAM pipeline.
      # Mount the host /tmp so both the host Rust binary and this container
      # can access the same mmap file when running run_atlas.py outside Docker.
      - /tmp:/tmp
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8420/health')",
        ]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: on-failure

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5

volumes:
  ollama_data:
