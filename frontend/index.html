<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlas-0 AR Overlay</title>
  <style>
    /* ── Reset & base ────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Scene container: camera feed + overlay canvas stacked ───────────── */
    #scene {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #camera-feed {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.85;
      background: #0a0a0f;
    }

    #overlay-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* ── Alert badges ────────────────────────────────────────────────────── */
    #alert-container {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .alert-badge {
      position: absolute;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.03em;
      white-space: nowrap;
      transform: translate(-50%, -100%);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.12);
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .alert-badge.severity-low  { background: rgba(200,180,0,0.75); color: #111; }
    .alert-badge.severity-mid  { background: rgba(220,100,0,0.80); color: #fff; }
    .alert-badge.severity-high { background: rgba(210,20,20,0.88); color: #fff; }

    .alert-badge .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    /* ── HUD ─────────────────────────────────────────────────────────────── */
    #hud {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 14px 18px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent);
      pointer-events: none;
    }

    #hud-title {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.7);
    }

    #hud-title span { color: #3af; }

    #hud-stats {
      display: flex;
      gap: 16px;
      font-size: 11px;
      color: rgba(255,255,255,0.7);
    }

    .stat { display: flex; flex-direction: column; align-items: flex-end; }
    .stat .val { font-size: 16px; font-weight: 700; color: #fff; }

    /* ── Status bar ──────────────────────────────────────────────────────── */
    #status-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 18px;
      background: linear-gradient(to top, rgba(0,0,0,0.55), transparent);
      font-size: 11px;
    }

    #ws-status {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #ws-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #555;
      transition: background 0.3s;
    }
    #ws-dot.connected    { background: #2f2; }
    #ws-dot.connecting   { background: #fa0; animation: pulse 1s infinite; }
    #ws-dot.disconnected { background: #f44; }

    #connect-btn {
      padding: 5px 14px;
      border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.08);
      color: #ddd;
      font-size: 11px;
      cursor: pointer;
      pointer-events: all;
      transition: background 0.2s;
    }
    #connect-btn:hover { background: rgba(255,255,255,0.18); }

    #risk-count-badge {
      padding: 3px 10px;
      border-radius: 12px;
      background: rgba(200,20,20,0.7);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── Legend ──────────────────────────────────────────────────────────── */
    #legend {
      position: absolute;
      right: 18px;
      top: 60px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 11px;
      color: rgba(255,255,255,0.65);
      pointer-events: none;
    }

    .legend-row { display: flex; align-items: center; gap: 7px; }

    .legend-icon {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .legend-icon.zone   { background: rgba(255, 80, 0, 0.55); border: 1.5px solid rgba(255, 100, 0, 0.9); }
    .legend-icon.arc    { background: transparent; border: 1.5px dashed rgba(255,220,0,0.8); }
    .legend-icon.impact { background: rgba(255, 30, 30, 0.3); border: 1.5px solid rgba(255,50,50,0.8); border-radius: 2px; }
  </style>
</head>
<body>
  <div id="scene">
    <!-- Camera feed placeholder (replace src with actual stream URL) -->
    <video id="camera-feed" autoplay muted playsinline></video>

    <!-- Three.js overlay canvas -->
    <canvas id="overlay-canvas"></canvas>

    <!-- CSS alert badges rendered here -->
    <div id="alert-container"></div>

    <!-- HUD -->
    <div id="hud">
      <div id="hud-title">ATLAS<span>-0</span></div>
      <div id="hud-stats">
        <div class="stat"><span class="val" id="stat-risks">0</span>risks</div>
        <div class="stat"><span class="val" id="stat-objs">0</span>objects</div>
      </div>
    </div>

    <!-- Legend -->
    <div id="legend">
      <div class="legend-row"><div class="legend-icon zone"></div>Risk zone</div>
      <div class="legend-row"><div class="legend-icon arc"></div>Trajectory</div>
      <div class="legend-row"><div class="legend-icon impact"></div>Impact zone</div>
    </div>

    <!-- Status bar -->
    <div id="status-bar">
      <div id="ws-status">
        <div id="ws-dot" class="disconnected"></div>
        <span id="ws-label">Disconnected</span>
      </div>
      <div id="risk-count-badge" style="display:none">0 risks</div>
      <button id="connect-btn">Connect</button>
    </div>
  </div>

  <!-- Three.js r158 from CDN -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
      }
    }
  </script>

  <script type="module" src="js/overlay.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
